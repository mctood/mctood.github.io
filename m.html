<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script>
    // default: 1 millimeter
    // default: 1 gram
    function randint(min, max) {
        min = Math.ceil(min);
        max = Math.floor(max);
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    const m_distance = {
        "мм": 1,
        "см": 10,
        "дм": 100,
        "м": 1000,
        "км": 1000000
    }
    const m_weight = {
        "г": 1,
        "кг": 1000,
        "ц": 100000,
        "т": 1000000
    }
    let arr_distance = Object.entries(m_distance)
    let arr_weight = Object.entries(m_weight)
    // WEIGHT

    let from1 = randint(2, 3);
    let from2 = randint(1, from1-1);
    let to = arr_weight[randint(1, from2+1)-1];
    from2 = arr_weight[from2];
    from1 = arr_weight[from1];
    const from1_amount = randint(1, 10);
    const from2_amount = randint(1, 100);
    
    const answer = (from1_amount * from1[1] + from2_amount * from2[1]) / to[1];
    //// test_formatting
    $(() => {
        $(".test").html(`<div class="text">${from1_amount}${from1[0]} ${from2_amount}${from2[0]} = </div>
    <input type="text" class="input">
    <div class="text">${to[0]}</div>`);
    $(".next").mousedown((e) => {
        let input = Number($('.input').val());
        if (input == answer) {
            $(e.target).text("Правильно!")
            $(e.target).css({
                color: "green",
                border: "1px solid green"
            })
        } else {
            $(e.target).text("Неправильно")
            $(e.target).css({
                color: "red",
                border: "1px solid red"
            })
        }
        $(".next").mousedown((e) => {
            location.reload();
        })
    })
    })
    
</script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    .content {
        display: flex;
        justify-content: center !important;
        margin-top: 100px;
        font-family: 'Montserrat';
        font-weight: 600;
        font-size: 2em;
        flex-direction: column;
        align-content: center;
        flex-wrap: wrap;
        align-items: center;
    }
    .next {
        font-size: 1em;
        padding: 10px 20px;
        margin: 20px 0px;
        text-align: center;
        border: 1px solid black;
        font-weight: 300;
        border-radius: 10px;
        user-select: none;
        display: inline-block;
        transition: .2s;
    }   
    .next:hover {
        cursor: pointer;
    }
    .test {
        display: flex;
        justify-content: center;
        flex-direction: row !important;
    }
    .input {
        margin: 0 12pt;
        width: 4em;
        font-size: 1em;
        border: none;
        border-bottom: 2px solid grey !important;
        border-radius: 0;
    }
    .input:focus {
        outline-width: 0;
        outline: none;
    }
    
</style>

<div class="content">
    <div class="test">
        
    </div>
    <div class="next">Ответить</div>
</div>
