<script>
  $(() => {
    $.ajax("https://api.github.com/repos/mctood/mctood.github.io/contents/images").done((e) => {
      e.forEach(i => {
        $("#imgs").append(`
            
            <div class="col-6 col-lg-4 mb-4">
              <div class="card">
                <img src="${i.html_url}?raw=true" class="card-img-top">
        
                <div class="card-body">
                  <p class="card-text">${i.name.replace(/_/gm, " ").replace(/\.[\w\d]+$/, "")}</p>
                </div>
              </div>
            </div>`)
      })
      $(window).scroll(() => new Masonry($("#imgs")[0]))
      $("img").load(() => new Masonry($("#imgs")[0]))
    })
  })
</script>
